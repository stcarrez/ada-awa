<f:view contentType="text/html; charset=UTF-8"
        xmlns:f="http://java.sun.com/jsf/core"
        xmlns:h="http://java.sun.com/jsf/html"
        xmlns:util="http://code.google.com/p/ada-asf/util">
    <f:metadata>
        <f:viewParam id='id' value='#{blogPublishComment.id}'/>
    </f:metadata>
    <h:form id='post'>
        <h:inputHidden id='comment-id' value='#{blogPublishComment.id}' required='false'/>
        <h:messages styleClass='awa-error'/>
        <dl class="awa-required#{util:hasMessage('text') ? ' awa-error' : ''}">
            <dd>
                <h:inputTextarea id='c_text}' rows='10' required='true' value='#{blogPublishComment.message}'/>
            </dd>
        </dl>
        <ul class='awa-buttons'>
            <li>
                <h:commandButton id='create'
                                 value='#{blogMsg.blog_post_save_comment}'
                                 styleClass="ui-button ui-state-default ui-corner-all"
                                 action="#{blogPublishComment.save}"/>
            </li>
        </ul>
    </h:form>

    <util:script>
        $('#c_#{blogPublishComment.id} textarea').focus();
    </util:script>
</f:view>
