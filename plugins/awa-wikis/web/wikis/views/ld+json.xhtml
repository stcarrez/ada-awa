<util:json xmlns:util="http://code.google.com/p/ada-asf/util"
           jtype="WebPage">
  <util:json-prop name="name" value="#{wikiView.title}"/>
  <util:json-prop name="url" value="#{initParam['app_url_base']}/wikis/view/#{wikiView.wiki_id}/#{wikiView.name}"/>
  <util:json-prop name="headline" value="#{wikiView.title}"/>
  <util:json-prop name="description" value="#{wikiView.title}"/>
  <util:json-obj name="author" jtype="Person">
    <util:json-prop name="name" value="#{wikiView.author}"/>
  </util:json-obj>
  <util:json-prop name="dateCreated" value="#{wikiView.date}"/>
  <util:json-prop name="dateModified" value="#{wikiView.date}"/>
  <util:json-prop name="datePublished" value="#{wikiView.date}"/>
  <util:json-prop name="inLanguage" value="en"/>
  <util:json-obj name="mainEntityOfPage" jtype="WebPage" jid="#{initParam['app_url_base']}/wikis/view/#{wikiView.wiki_id}/#{wikiView.name}"/>
  <util:json-obj rendered="#{not empty post.image}" jtype="ImageObject"
                 name="image" jid="#{initParam['app_url_domain']}#{post.image}"/>
  <util:json-array name="potentialAction">
    <util:json-obj jtype="ReadAction">
      <util:json-prop name="target" value="#{initParam['app_url_base']}/wikis/view/#{wikiView.wiki_id}/#{wikiView.name}"/>
    </util:json-obj>
  </util:json-array>
</util:json>
