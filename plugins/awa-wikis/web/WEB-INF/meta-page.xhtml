<ui:composition xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:util="http://code.google.com/p/ada-asf/util">
    <meta name="author" content="#{wikiView.author}"/>
    <meta name="description" content="#{util:escapeJavaScript(pageDescription)}"/>
    <link rel="canonical" href="#{pageUrl}"/>
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="#{pageUrl}"/>
    <meta property="og:title" content="#{title}"/>
    <meta property="og:site_name" content="#{initParam['app_name']}"/>
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:description" content="#{util:escapeJavaScript(pageDescription)}"/>
    <util:json jtype="WebPage">
        <util:json-prop name="name" value="#{title}"/>
        <util:json-prop name="url" value="#{pageUrl}"/>
        <util:json-prop name="headline" value="#{wikiView.title}"/>
        <util:json-prop name="description" value="#{pageDescription}"/>
        <util:json-obj name="author" jtype="Person">
            <util:json-prop name="name" value="#{wikiView.author}"/>
        </util:json-obj>
        <util:json-prop name="dateCreated" value="#{wikiView.date}"/>
        <util:json-prop name="dateModified" value="#{wikiView.date}"/>
        <util:json-prop name="datePublished" value="#{wikiView.date}"/>
        <util:json-prop name="inLanguage" value="en"/>
        <util:json-obj name="mainEntityOfPage" jtype="WebPage" jid="#{pageUrl}"/>
        <ui:include src="/WEB-INF/ld+json-org.xhtml"/>
        <util:json-array name="potentialAction">
            <util:json-obj jtype="ReadAction">
                <util:json-prop name="target" value="#{pageUrl}"/>
            </util:json-obj>
        </util:json-array>
    </util:json>
</ui:composition>
